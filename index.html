<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIR - Global Messenger</title>
    
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%235b5fc7%22/><text y=%22.9em%22 font-size=%2270%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22 x=%225%22>AIR</text></svg>">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; height: 100vh; background: #0d0d0d; color: white; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- UI COMPONENTS --- */
        header { 
            padding: 12px 15px; background: #1a1a1a; display: flex; align-items: center; 
            border-bottom: 1px solid #333; gap: 15px; z-index: 10;
        }

        .hamburger { font-size: 24px; cursor: pointer; color: #7f85f5; background: none; border: none; padding: 5px; }
        
        #sidebar { 
            position: absolute; left: -280px; top: 0; bottom: 0; width: 280px; 
            background: rgba(15, 15, 15, 0.98); backdrop-filter: blur(15px);
            z-index: 100; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border-right: 1px solid #333; padding: 25px;
        }
        #sidebar.open { left: 0; box-shadow: 10px 0 50px rgba(0,0,0,0.8); }
        
        #overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 99; 
        }
        #overlay.show { display: block; }

        /* --- SIDEBAR CONTENT --- */
        .id-label { font-size: 10px; color: #5b5fc7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .id-box { 
            font-size: 13px; background: #000; padding: 12px; border-radius: 10px; 
            margin-bottom: 20px; border: 1px dashed #5b5fc7; word-break: break-all;
            cursor: pointer; text-align: center; color: #7f85f5;
        }
        .id-box:active { background: #111; }

        .connect-input { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; 
            background: #111; color: white; margin-bottom: 10px; font-size: 14px;
        }
        .conn-btn { 
            width: 100%; background: #5b5fc7; color: white; border: none; 
            padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        /* --- CHAT AREA --- */
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; 
            flex-direction: column; gap: 12px; scroll-behavior: smooth;
        }

        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; position: relative; }
        .sent { align-self: flex-end; background: #3b3c51; border: 1px solid #5b5fc7; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #262626; border-bottom-left-radius: 4px; }
        .msg-time { font-size: 10px; color: #666; margin-top: 5px; display: block; text-align: right; }
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        /* --- INPUT BAR --- */
        .input-area { padding: 15px; background: #1a1a1a; display: flex; gap: 10px; align-items: flex-end; }
        textarea { 
            flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #333; 
            background: #000; color: white; resize: none; height: 45px; 
            font-size: 15px; line-height: 20px;
        }
        .btn-icon { 
            background: #262626; color: white; border: 1px solid #333; 
            width: 45px; height: 45px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .status-dot { width: 8px; height: 8px; background: #555; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #6bb700; box-shadow: 0 0 8px #6bb700; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleMenu()"></div>
    
    <div id="sidebar">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:30px;">
            <svg width="32" height="32" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#5b5fc7"/><text x="50%" y="65%" text-anchor="middle" fill="white" font-weight="bold" font-size="40">A</text></svg>
            <h2 style="margin:0; font-size:20px;">AIR Settings</h2>
        </div>

        <div class="id-label">Your Connection ID</div>
        <div class="id-box" id="my-id" onclick="copyMyID()">Connecting...</div>
        
        <div class="id-label">Connect to Friend</div>
        <input type="text" id="remote-id" class="connect-input" placeholder="Paste Friend's ID...">
        <button class="conn-btn" onclick="connectToPeer()">Connect Now</button>
        
        <div style="margin-top: 40px;">
            <button onclick="clearHistory()" style="width:100%; background:none; border:1px solid #ff4444; color:#ff4444; padding:10px; border-radius:10px; font-size:12px;">Wipe Chat History</button>
        </div>
    </div>

    <header>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <div style="display:flex; flex-direction:column;">
            <b id="status-text" style="font-size: 16px;">AIR Messenger</b>
            <span id="sub-status" style="font-size: 10px; color: #666;"><span class="status-dot" id="dot"></span>Offline</span>
        </div>
    </header>

    <div id="chat-window">
        </div>

    <div class="input-area">
        <button class="btn-icon" onclick="document.getElementById('fileInput').click()">+</button>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="sendImage(this)">
        <textarea id="msgInput" placeholder="Type a message..." onkeydown="handleEnter(event)"></textarea>
        <button class="btn-icon" style="background:#5b5fc7; border:none;" onclick="sendMessage()">➤</button>
    </div>

    <script>
        const peer = new Peer();
        let conn;
        const chatWin = document.getElementById('chat-window');

        // 1. LOAD HISTORY FROM PHONE MEMORY
        window.onload = () => {
            const history = JSON.parse(localStorage.getItem('air_v3_history')) || [];
            history.forEach(m => displayMsg(m.data, m.side));
        };

        // 2. PEERJS SETUP
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        peer.on('connection', (c) => {
            conn = c;
            setupChat();
        });

        // 3. UI LOGIC
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function copyMyID() {
            const id = document.getElementById('my-id').innerText;
            if(id === "Connecting...") return;
            navigator.clipboard.writeText(id);
            alert("ID Copied! Send it to your friend.");
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // 4. CONNECTION LOGIC
        function connectToPeer() {
            const id = document.getElementById('remote-id').value.trim();
            if (!id) return alert("Please enter a friend's ID!");
            conn = peer.connect(id);
            setupChat();
            toggleMenu();
        }

        function setupChat() {
            conn.on('open', () => {
                document.getElementById('status-text').innerText = "Connected to Friend";
                document.getElementById('sub-status').innerHTML = '<span class="status-dot online"></span>Active Session';
                document.getElementById('sub-status').style.color = "#6bb700";
            });
            conn.on('data', (data) => {
                saveAndDisplay(data, 'received');
            });
            conn.on('close', () => {
                document.getElementById('status-text').innerText = "AIR Messenger";
                document.getElementById('sub-status').innerHTML = '<span class="status-dot"></span>Offline';
                document.getElementById('sub-status').style.color = "#666";
            });
        }

        // 5. MESSAGING LOGIC
        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            if (!conn) return alert("Not connected to anyone! Open the menu to connect.");

            const data = { 
                type: 'text', 
                content: input.value, 
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) 
            };
            
            conn.send(data);
            saveAndDisplay(data, 'sent');
            input.value = "";
        }

        function sendImage(input) {
            if (input.files && input.files[0] && conn) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const data = { 
                        type: 'image', 
                        content: e.target.result, 
                        time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) 
                    };
                    conn.send(data);
                    saveAndDisplay(data, 'sent');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveAndDisplay(data, side) {
            const history = JSON.parse(localStorage.getItem('air_v3_history')) || [];
            history.push({ data, side });
            localStorage.setItem('air_v3_history', JSON.stringify(history));
            displayMsg(data, side);
        }

        function displayMsg(data, side) {
            const div = document.createElement('div');
            div.className = `msg ${side}`;
            
            if (data.type === 'text') {
                div.innerText = data.content;
            } else {
                div.innerHTML = `<img src="${data.content}" class="chat-img" onclick="window.open(this.src)">`;
            }
            
            const timeSpan = document.createElement('span');
            timeSpan.className = 'msg-time';
            timeSpan.innerText = data.time;
            div.appendChild(timeSpan);

            chatWin.appendChild(div);
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        function clearHistory() {
            if(confirm("This will permanently delete your chat history from this device. Continue?")) {
                localStorage.removeItem('air_v3_history');
                chatWin.innerHTML = "";
                toggleMenu();
            }
        }
    </script>
</body>
</html>
