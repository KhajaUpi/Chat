<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIR - Persistent Chat</title>
    
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%235b5fc7%22/><text y=%22.9em%22 font-size=%2270%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22 x=%225%22>AIR</text></svg>">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; height: 100vh; 
            background: #0d0d0d; color: white; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Header & Sidebar */
        header { 
            padding: 12px 15px; background: #1a1a1a; display: flex; align-items: center; 
            border-bottom: 1px solid #333; gap: 10px; z-index: 10;
        }
        .hamburger { font-size: 24px; cursor: pointer; color: #7f85f5; background: none; border: none; }
        
        #sidebar { 
            position: absolute; left: -280px; top: 0; bottom: 0; width: 280px; 
            background: rgba(20, 20, 20, 0.98); backdrop-filter: blur(10px);
            z-index: 100; transition: 0.3s; border-right: 1px solid #333; padding: 20px;
        }
        #sidebar.open { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; }
        #overlay.show { display: block; }

        /* ID Display & Connect */
        .id-box { font-size: 11px; background: #222; padding: 8px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #444; word-break: break-all; }
        .connect-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; margin-bottom: 10px; }

        /* Chat Area */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 14px; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: #3b3c51; border: 1px solid #5b5fc7; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #262626; border-bottom-left-radius: 2px; }
        .msg-time { font-size: 9px; color: #666; margin-top: 4px; display: block; text-align: right; }

        /* Input Bar */
        .input-area { padding: 10px; background: #1a1a1a; display: flex; gap: 8px; align-items: flex-end; }
        textarea { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; resize: none; height: 42px; outline: none; }
        .btn { background: #2d2d2d; color: white; border: 1px solid #444; width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleMenu()"></div>
    
    <div id="sidebar">
        <h3 style="color:#7f85f5; margin-top:0;">AIR Menu</h3>
        <div class="id-box" id="my-id">Generating ID...</div>
        <input type="text" id="remote-id" class="connect-input" placeholder="Friend's ID...">
        <button class="login-btn" onclick="connectToPeer()" style="width:100%; background:#5b5fc7; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold;">Connect Friend</button>
        <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
        <button onclick="clearHistory()" style="width:100%; background:#ff4444; color:white; border:none; padding:10px; border-radius:8px; font-size:12px;">Clear All Chat</button>
    </div>

    <header>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <b id="status-text">AIR Messenger</b>
    </header>

    <div id="chat-window"></div>

    <div class="input-area">
        <button class="btn" onclick="document.getElementById('fileInput').click()">+</button>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="sendImage(this)">
        <textarea id="msgInput" placeholder="Message..." onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"></textarea>
        <button class="btn" style="color: #5b5fc7;" onclick="sendMessage()">➤</button>
    </div>

    <script>
        const peer = new Peer();
        let conn;
        const chatWin = document.getElementById('chat-window');

        // Load History from Phone Memory
        window.onload = () => {
            const history = JSON.parse(localStorage.getItem('air_p2p_history')) || [];
            history.forEach(m => displayMsg(m.data, m.side));
        };

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = "My ID: " + id;
        });

        peer.on('connection', (c) => {
            conn = c;
            setupChat();
        });

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function connectToPeer() {
            const id = document.getElementById('remote-id').value;
            if (!id) return alert("Enter ID!");
            conn = peer.connect(id);
            setupChat();
            toggleMenu();
        }

        function setupChat() {
            conn.on('open', () => {
                document.getElementById('status-text').innerText = "Connected ✅";
                document.getElementById('status-text').style.color = "#6bb700";
            });
            conn.on('data', (data) => {
                saveAndDisplay(data, 'received');
            });
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim() || !conn) return;
            const data = { type: 'text', content: input.value, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
            conn.send(data);
            saveAndDisplay(data, 'sent');
            input.value = "";
        }

        function sendImage(input) {
            if (input.files && input.files[0] && conn) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const data = { type: 'image', content: e.target.result, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
                    conn.send(data);
                    saveAndDisplay(data, 'sent');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveAndDisplay(data, side) {
            // Save to Phone Memory
            const history = JSON.parse(localStorage.getItem('air_p2p_history')) || [];
            history.push({ data, side });
            localStorage.setItem('air_p2p_history', JSON.stringify(history));
            
            displayMsg(data, side);
        }

        function displayMsg(data, side) {
            const div = document.createElement('div');
            div.className = `msg ${side}`;
            if (data.type === 'text') {
                div.innerText = data.content;
            } else {
                div.innerHTML = `<img src="${data.content}" style="max-width:100%; border-radius:8px;">`;
            }
            div.innerHTML += `<span class="msg-time">${data.time}</span>`;
            chatWin.appendChild(div);
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        function clearHistory() {
            if(confirm("Clear all messages?")) {
                localStorage.removeItem('air_p2p_history');
                chatWin.innerHTML = "";
                toggleMenu();
            }
        }
    </script>
</body>
</html>
