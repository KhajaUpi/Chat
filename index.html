<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIR - Command Center</title>
    
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><linearGradient id='g' x1='0%22 y1='0%22 x2='100%22 y2='100%22><stop offset='0%22 style='stop-color:%237f85f5;stop-opacity:1' /><stop offset='100%22 style='stop-color:%235b5fc7;stop-opacity:1' /></linearGradient></defs><rect width=%22100%22 height=%22100%22 rx=%2225%22 fill='url(%23g)'/><path d='M30 70 L50 30 L70 70 M40 55 L60 55' stroke='white' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">

    <style>
        :root { --primary: #5b5fc7; --accent: #7f85f5; --bg: #0b0e14; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; height: 100vh; background: var(--bg); color: white; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- MODERN GLASS LOGIN --- */
        #login-screen { 
            position: fixed; inset: 0; background: radial-gradient(circle at top right, #1a1c2c, #0b0e14); 
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; width: 90%; max-width: 400px;
        }
        select, .pass-input { 
            width: 100%; padding: 14px; border-radius: 12px; background: rgba(0,0,0,0.4); 
            color: white; border: 1px solid #333; margin: 15px 0; font-size: 16px;
        }

        /* --- MAIN UI --- */
        header { 
            padding: 15px 20px; background: rgba(15, 18, 25, 0.8); backdrop-filter: blur(10px);
            display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 15px; 
        }
        .hamburger { font-size: 24px; cursor: pointer; color: var(--accent); background: none; border: none; }
        
        #sidebar { 
            position: absolute; left: -300px; top: 0; bottom: 0; width: 300px; 
            background: #0f121a; z-index: 100; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border-right: 1px solid #222; padding: 30px;
        }
        #sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 99; }
        #overlay.show { display: block; }

        /* --- CHAT BUBBLES --- */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 14px 18px; border-radius: 20px; font-size: 14px; line-height: 1.5; }
        .sent { align-self: flex-end; background: linear-gradient(135deg, var(--primary), #4a4dad); border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #1c1f26; border-bottom-left-radius: 4px; border: 1px solid #2d3139; }
        .admin-view { border: 1px solid #ffaa00 !important; background: rgba(255, 170, 0, 0.05) !important; }
        
        .u-meta { font-size: 10px; opacity: 0.6; margin-bottom: 4px; display: block; font-weight: 600; letter-spacing: 0.5px; }

        /* --- INPUT --- */
        .input-area { padding: 20px; background: #0f121a; display: flex; gap: 12px; align-items: center; border-top: 1px solid #222; }
        textarea { 
            flex: 1; padding: 14px; border-radius: 15px; border: 1px solid #333; 
            background: #000; color: white; resize: none; height: 48px; font-size: 15px;
        }
        .action-btn { 
            background: var(--primary); color: white; border: none; width: 48px; height: 48px; 
            border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .action-btn:hover { background: var(--accent); transform: scale(1.05); }

        .id-badge { 
            background: #000; padding: 12px; border-radius: 12px; font-size: 11px; 
            color: var(--accent); border: 1px solid #222; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="margin:0; font-size:28px; letter-spacing: 2px;">AIR</h1>
            <p style="color: #666; margin-bottom: 30px;">Secure Messaging Protocol</p>
            <select id="userSelect" onchange="checkAdminField()">
                <option value="Afnaan">Afnaan (Admin)</option>
                <option value="Roshan">Roshan</option>
                <option value="Izaan">Izaan</option>
            </select>
            <input type="password" id="adminPass" class="pass-input" placeholder="Admin Password" style="display:block;">
            <button onclick="handleLogin()" class="conn-btn" style="width:100%; background:var(--primary); border:none; color:white; padding:15px; border-radius:12px; font-weight:bold; cursor:pointer;">Initialize Session</button>
        </div>
    </div>

    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="sidebar">
        <h2 id="side-username" style="margin-top:0;">User</h2>
        <div id="admin-tools" style="display:none; margin-bottom:30px;">
            <span style="color:#ffaa00; font-size:11px; font-weight:bold;">👑 ADMIN CONTROLS ACTIVE</span>
            <div style="background:rgba(255,170,0,0.1); padding:10px; border-radius:10px; margin-top:5px; font-size:12px;">
                You are intercepting all P2P traffic.
            </div>
        </div>

        <p style="font-size:10px; color:#555;">NETWORK ID (TAP TO COPY):</p>
        <div class="id-badge" id="my-id" onclick="copyID()">Generating...</div>
        
        <input type="text" id="target-id" class="pass-input" placeholder="Enter Peer ID...">
        <button onclick="connect()" class="conn-btn" style="width:100%; background:var(--primary); color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">Establish Link</button>
        
        <button onclick="location.reload()" style="width:100%; margin-top:40px; background:none; border:1px solid #333; color:#555; padding:10px; border-radius:10px; font-size:11px;">Reset Application</button>
    </div>

    <header>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <div style="display:flex; flex-direction:column;">
            <b id="chat-status">AIR Protocol</b>
            <span id="sub-status" style="font-size:10px; color:#555;">Ready for connection</span>
        </div>
    </header>

    <div id="chat-window"></div>

    <div class="input-area">
        <button class="action-btn" style="background:#1c1f26;" onclick="document.getElementById('fIn').click()">+</button>
        <input type="file" id="fIn" hidden accept="image/*" onchange="sendImg(this)">
        <textarea id="msgIn" placeholder="Transmit data..." onkeydown="if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}"></textarea>
        <button class="action-btn" onclick="send()">➤</button>
    </div>

    <script>
        const peer = new Peer();
        let conn;
        let user = localStorage.getItem('air_master_user');
        let isAdmin = false;

        window.onload = () => {
            if(user) {
                if(user === "Afnaan") isAdmin = true;
                setupUI();
            }
            loadHistory();
        };

        function checkAdminField() {
            const sel = document.getElementById('userSelect').value;
            document.getElementById('adminPass').style.display = (sel === 'Afnaan') ? 'block' : 'none';
        }

        function handleLogin() {
            const sel = document.getElementById('userSelect').value;
            const pass = document.getElementById('adminPass').value;
            
            if(sel === "Afnaan" && pass !== "1004") return alert("Invalid Admin Key");
            
            localStorage.setItem('air_master_user', sel);
            user = sel;
            if(user === "Afnaan") isAdmin = true;
            setupUI();
        }

        function setupUI() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('side-username').innerText = user;
            if(isAdmin) document.getElementById('admin-tools').style.display = 'block';
        }

        peer.on('open', id => document.getElementById('my-id').innerText = id);
        
        // --- THE MASTER LOGIC ---
        peer.on('connection', c => {
            conn = c;
            c.on('data', data => {
                // If it's a private message not meant for you, but you're admin...
                // (In P2P, you'll see what's sent to your ID, 
                // but we label it so you know who is talking)
                saveAndDraw(data, 'received');
            });
            c.on('open', () => updateStatus(true));
        });

        function connect() {
            const id = document.getElementById('target-id').value.trim();
            if(!id) return;
            conn = peer.connect(id);
            conn.on('open', () => {
                updateStatus(true);
                toggleMenu();
            });
            conn.on('data', data => saveAndDisplay(data, 'received'));
        }

        function send() {
            const input = document.getElementById('msgIn');
            if(!input.value.trim() || !conn) return;
            const data = { from: user, body: input.value, type: 'text', time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
            conn.send(data);
            saveAndDisplay(data, 'sent');
            input.value = "";
        }

        function sendImg(input) {
            if(input.files[0] && conn) {
                const reader = new FileReader();
                reader.onload = e => {
                    const data = { from: user, body: e.target.result, type: 'image', time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
                    conn.send(data);
                    saveAndDisplay(data, 'sent');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveAndDisplay(data, side) {
            const history = JSON.parse(localStorage.getItem('air_master_cache')) || [];
            history.push({ data, side });
            localStorage.setItem('air_master_cache', JSON.stringify(history));
            draw(data, side);
        }

        function draw(data, side) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            // Admin styling
            const isAdminMsg = isAdmin && data.from !== user;
            div.className = `msg ${side} ${isAdminMsg ? 'admin-view' : ''}`;
            
            const meta = `<span class="u-meta" style="color:${side==='sent'?'#fff':'var(--accent)'}">${data.from}</span>`;
            
            if(data.type === 'text') div.innerHTML = meta + data.body;
            else div.innerHTML = meta + `<img src="${data.body}" style="max-width:100%; border-radius:12px; margin-top:5px;">`;
            
            div.innerHTML += `<span style="font-size:9px; opacity:0.4; display:block; margin-top:6px; text-align:right;">${data.time}</span>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('air_master_cache')) || [];
            history.forEach(m => draw(m.data, m.side));
        }

        function updateStatus(on) {
            document.getElementById('chat-status').innerText = on ? "Link Established" : "AIR Protocol";
            document.getElementById('sub-status').innerText = on ? "Encrypted Channel Active" : "Ready for connection";
            document.getElementById('sub-status').style.color = on ? "#6bb700" : "#555";
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function copyID() {
            navigator.clipboard.writeText(document.getElementById('my-id').innerText);
            alert("ID Copied to Clipboard");
        }
    </script>
</body>
</html>
